<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Para Kazanma</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 80px 20px;
    }
    .box {
      max-width: 800px;
      margin: auto;
      background: #111827;
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,.3);
    }
    h1 {
      font-size: 42px;
      margin-bottom: 16px;
    }
    p {
      font-size: 20px;
      color: #cbd5e1;
      line-height: 1.6;
    }
    .tag {
      display: inline-block;
      margin-top: 20px;
      background: #22c55e;
      color: #06240f;
      padding: 12px 18px;
      border-radius: 999px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>AI Para Kazanma</h1>
    <p>Yapay zekâ ile yapılabilecek işleri, promptları ve hesaplama araçlarını keşfet.</p>
    <div class="tag">Site yakında yayında</div>
  </div>
</body>
</html>
