<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Gemini Storybook Deneme</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --text: #202124;
      --muted: #5f6368;
      --line: #dfe3e8;
      --note: #fff8e1;
      --note-line: #f2c94c;
      --button: #1a73e8;
      --button-hover: #1558b0;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    main {
      width: min(100%, 920px);
      margin: 0 auto;
      padding: 32px 16px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      line-height: 1.15;
    }

    p {
      margin: 0;
      color: var(--muted);
    }

    .open-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      margin: 24px 0;
      padding: 12px 18px;
      border-radius: 6px;
      background: var(--button);
      color: #fff;
      font-weight: 700;
      text-decoration: none;
      transition: background-color 160ms ease;
    }

    .open-button:hover,
    .open-button:focus {
      background: var(--button-hover);
    }

    .note {
      margin: 0 0 16px;
      padding: 14px 16px;
      border: 1px solid var(--note-line);
      border-radius: 6px;
      background: var(--note);
      color: var(--text);
    }

    .frame-wrap {
      width: 100%;
      min-height: 70vh;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      overflow: hidden;
    }

    iframe {
      display: block;
      width: 100%;
      height: 70vh;
      min-height: 480px;
      border: 0;
    }

    @media (max-width: 640px) {
      main {
        padding: 24px 12px;
      }

      .open-button {
        width: 100%;
      }

      .frame-wrap,
      iframe {
        min-height: 560px;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Gemini Storybook Deneme</h1>
    <p>Bu sayfa sadece test ama&ccedil;l&#305;d&#305;r.</p>

    <a
      class="open-button"
      href="https://gemini.google.com/share/2bfe9cb13083"
      target="_blank"
      rel="noopener noreferrer nofollow"
    >
      Hikayeyi Gemini Storybook&rsquo;ta A&ccedil;
    </a>

    <div class="note">
      E&#287;er a&#351;a&#287;&#305;daki alanda Gemini a&ccedil;&#305;lmazsa, Google site i&ccedil;ine g&ouml;mmeye izin vermiyor demektir.
    </div>

    <div class="frame-wrap">
      <iframe
        src="https://gemini.google.com/share/2bfe9cb13083"
        title="Gemini Storybook iframe testi"
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"
      ></iframe>
    </div>
  </main>
</body>
</html>
